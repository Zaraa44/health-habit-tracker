<div class="card habits-card" id="habitsCard">
  <div class="habits-header">
    <span class="habits-title">Habits</span>
    <button class="habits-add-btn" id="habitsAddBtn" aria-label="Add habit">
      <svg viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="habits-scroll" id="habitsScroll"></div>
  <p class="habits-empty" id="habitsEmpty">No habits yet — tap + to add one</p>
</div>

<div class="modal-overlay" id="habitModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Habit</div>

    <div class="habit-field">
      <label for="habitName">Name</label>
      <input id="habitName" type="text" placeholder="e.g. Drink water" maxlength="24" autocomplete="off"/>
    </div>

    <div class="habit-field-grid">
      <div class="habit-field">
        <label for="habitGoal">Daily Goal</label>
        <input id="habitGoal" type="number" min="0.1" step="0.1" value="1" inputmode="decimal"/>
      </div>
      <div class="habit-field">
        <label for="habitUnit">Unit</label>
        <input id="habitUnit" type="text" placeholder="count, ml, g, km" maxlength="12" autocomplete="off"/>
      </div>
    </div>

    <div class="habit-field">
      <label for="habitIncrement">Add Amount Per Tap</label>
      <input id="habitIncrement" type="number" min="0.1" step="0.1" value="1" inputmode="decimal"/>
    </div>

    <div class="habit-field">
      <label>Icon</label>
      <div class="icon-grid" id="iconGrid"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" id="habitSaveBtn">Save</button>
      <button class="btn-danger" id="habitDeleteBtn" style="display:none">Delete Habit</button>
      <button class="btn-secondary" id="habitCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="habitTrendsModal">
  <div class="modal-sheet trends-sheet">
    <div class="modal-handle"></div>
    <div class="trends-header">
      <div>
        <div class="modal-title trends-title">Habit Trends</div>
        <div class="trends-subtitle">Current streaks and the last 7 days</div>
      </div>
      <button class="trends-close-btn" id="habitTrendsCloseBtn" aria-label="Close trends">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="trends-list" id="habitTrendsList"></div>
    <p class="trends-empty" id="habitTrendsEmpty">
      No habit data yet. Complete a habit to start building a streak.
    </p>
  </div>
</div>
